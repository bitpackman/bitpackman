name: build city of commits

on:
  # 毎日0:20(UTC)に再生成(pacman/metricsの直後)
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/city.yml"
      - "scripts/generate-city.mjs"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate isometric city
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-city.mjs "${{ github.repository_owner }}"
      - name: Commit & Push generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A city/
          git commit -m "chore: rebuild city of commits" || echo "no changes"
          git push
